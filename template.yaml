AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Fetch games with ranks from BGG

Resources:
  FetchGamesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: fetch_games
      Description: ''
      MemorySize: 2048
      Timeout: 30
      Handler: app.handler
      Runtime: nodejs20.x
      PackageType: Zip
      Policies:
        - AWSLambdaBasicExecutionRole
        - S3CrudPolicy:
            BucketName: !Ref GameRankBucket
        - S3CrudPolicy:
            BucketName: bgg-rank-history.pzjc.pl
      Events:
        WeeklyTrigger:
          Type: Schedule
          Properties:
            Schedule: cron(0 0 * * ? *)
      Environment:
        Variables:
          PRIMARY_BUCKET_NAME: !Ref GameRankBucket
          SECONDARY_BUCKET_NAME: bgg-rank-history.pzjc.pl
          SECONDARY_BUCKET_PREFIX: data/
  GameRankBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: bgg-rank-scrapes
      # BucketName: !Sub "bgg-rank-scrapes-${AWS::StackName}"