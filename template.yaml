AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Fetch games with ranks from BGG

Parameters:
  AlertEmail:
    Type: String
    Default: your-email@example.com
    Description: Email address to receive Lambda failure alerts (AWS SNS sends
      these; confirm subscription after first deploy).

Resources:
  FailureAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: bgg-rank-scraper-failure-alerts
  FailureAlertsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref FailureAlertsTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sns:Publish
            Resource: !Ref FailureAlertsTopic
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !GetAtt FetchGamesFunction.Arn
  FailureAlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref FailureAlertsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail
  FetchGamesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: fetch_games
      Description: Scrapes BGG game rankings and uploads CSV to S3
      MemorySize: 2048
      Timeout: 30
      Handler: app.handler
      Runtime: nodejs20.x
      PackageType: Zip
      Policies:
        - AWSLambdaBasicExecutionRole
        - S3CrudPolicy:
            BucketName: !Ref GameRankBucket
        - S3CrudPolicy:
            BucketName: bgg-rank-history.pzjc.pl
      Events:
        WeeklyTrigger:
          Type: Schedule
          Properties:
            Schedule: cron(0 0 * * ? *)
      Environment:
        Variables:
          PRIMARY_BUCKET_NAME: !Ref GameRankBucket
          SECONDARY_BUCKET_NAME: bgg-rank-history.pzjc.pl
          SECONDARY_BUCKET_PREFIX: data/
      EventInvokeConfig:
        DestinationConfig:
          OnFailure:
            Type: SNS
            Destination: !Ref FailureAlertsTopic
  GameRankBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: bgg-rank-scrapes